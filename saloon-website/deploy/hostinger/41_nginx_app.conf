server {
    listen 80;
    listen [::]:80;
    server_name app.yourdomain.in;

    root /var/www/salon/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }
}
